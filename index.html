<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Mart | Fashion for Kids & Ladies</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7ff;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tagline{
font-size:14px;
margin-top:5px;
}

.hero{

background:white;
}

.hero h1{
font-size:32px;
color:#0d47a1;
}

.hero p{

}

.btn{

margin-top:20px;
background:#1565c0;
color:white;
padding:12px 25px;

}

.categories{
padding:30px 20px;

.categories h2{

margin-bottom:20px;
}

.cat-box{
display:flex;
justify-content:center;
gap:15px;
}

.cat{

padding:20px;
border-radius:10px;
width:150px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

</head>

<body>

<header>
<header>
<img src="logo.png" alt="DN Mart Logo" style="height:80px;width:auto;">

<div class="tagline">Fashion for Kids & Ladies</div>

<div style="margin-top:15px;">
<input type="text" placeholder="Search Products..."
style="
padding:10px;

</header>

<section class="hero">

<section class="categories">

<div class="cat-box">
<div class="cat">👶 Kids Wear</div>

</div>

</section>

<div class="cat-box" style="flex-wrap:wrap;margin-top:20px;">

<p>₹399</p>
</div>

<div class="cat">

</div>

</div>
