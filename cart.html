<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN Mart Cart</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
color:#0d47a1;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

.btn{
background:#1565c0;
color:#fff;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#cartItems p{
margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🛒 Order Review</h1>

<div id="cartItems"></div>

<input type="text" id="customerName" placeholder="Enter Your Name">

<input type="tel" id="customerPhone" placeholder="Enter Mobile Number">

<h2 id="cartTotal"></h2>

<button class="btn" onclick="placeOrder()">
Place Order
</button>

<button class="btn" onclick="window.location.href='index.html'">
Continue Shopping
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach((item,index)=>{
html += `
<div style="margin:10px 0;padding:10px;border-bottom:1px solid #ddd;">
${index+1}. ${item.name} - ₹${item.price}

<button
onclick="removeItem(${index})"
style="
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
margin-left:10px;
cursor:pointer;
">
❌ Remove
</button>

</div>
`;

total += item.price;
});
document.getElementById("cartItems").innerHTML = html;
document.getElementById("cartTotal").innerHTML =
"Total Amount: ₹" + total;

function placeOrder(){

let name =
document.getElementById("customerName").value;

let phone =
document.getElementById("customerPhone").value;

let msg =
"Hello DN Mart,%0A%0A" +
"Name: " + name + "%0A" +
"Mobile: " + phone + "%0A%0A" +
"Order Details:%0A";

cart.forEach((item,index)=>{
msg += (index+1)+". "
+ item.name
+ " - ₹"
+ item.price
+ "%0A";
});

msg += "%0ATotal Amount: ₹" + total;

window.open(
"https://wa.me/918360091400?text="+msg,
"_blank"
);

localStorage.removeItem("cart");
cart = [];

setTimeout(() => {
    window.location.href = "index.html";
}, 1500);
}
function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    location.reload();
}
</script>

</body>
</html>
